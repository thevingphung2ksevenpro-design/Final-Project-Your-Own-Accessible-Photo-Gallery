<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Interactive Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Bộ Sưu Tập Ảnh Tương Tác Của Tôi</h1>

    <div id="image">
        Hover over an image below or use Tab key to display here.
    </div>

    <main class="preview-container">
        <figure>
            <img class="preview" src="https://www.wonderfulpcb.com/wp-content/uploads/2025/10/a857b4017ca84ce9b695693187675c51.jpg" alt="Hệ thống mạch điện tử và vi điều khiển IoT" onmouseover="upDate(this)" onmouseleave="undo()" onfocus="upDate(this)" onblur="undo()">
            <figcaption>IoT System</figcaption>
        </figure>

        <figure>
            <img class="preview" src="https://sovhtt.hanoi.gov.vn/wp-content/uploads/2019/01/bai-10-anh-1-nguoi-nghe-si-chay-het-minh-voi-dam-me-nghe-thuat.jpg" alt="Nghệ sĩ đang chơi nhạc cụ truyền thống Đàn Nhị" onmouseover="upDate(this)" onmouseleave="undo()" onfocus="upDate(this)" onblur="undo()">
            <figcaption>Đàn Nhị</figcaption>
        </figure>

        <figure>
            <img class="preview" src="https://hocvovinam.wordpress.com/wp-content/uploads/2013/12/don-chan-tan-cong-3.jpg" alt="Võ sinh Vovinam thực hiện thế đòn chân tấn công" onmouseover="upDate(this)" onmouseleave="undo()" onfocus="upDate(this)" onblur="undo()">
            <figcaption>Vovinam Martial Arts</figcaption>
        </figure>

        <figure>
            <img class="preview" src="https://i.sstatic.net/bfCUf.png" alt="Màn hình máy tính hiển thị mã nguồn C++ và cấu trúc dữ liệu" onmouseover="upDate(this)" onmouseleave="undo()" onfocus="upDate(this)" onblur="undo()">
            <figcaption>Software Engineering</figcaption>
        </figure>

        <figure>
            <img class="preview" src="https://arena.fpt.edu.vn/wp-content/uploads/2020/03/thiet-ke-game-3d-la-gi-min.jpg" alt="Không gian thiết kế đồ họa game 3D chuyên nghiệp" onmouseover="upDate(this)" onmouseleave="undo()" onfocus="upDate(this)" onblur="undo()">
            <figcaption>3D Game Design</figcaption>
        </figure>

        <figure>
            <img class="preview" src="https://media-cdn-v2.laodong.vn/Storage/NewsPortal/2023/2/13/1147105/DSC06300.jpg" alt="Khuôn viên trường đại học công nghệ hiện đại" onmouseover="upDate(this)" onmouseleave="undo()" onfocus="upDate(this)" onblur="undo()">
            <figcaption>University Campus</figcaption>
        </figure>
    </main>

    <script src="script.js"></script>
</body>
</html>
